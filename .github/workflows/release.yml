name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: video-tool

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            binary_name: video-tool.exe
            archive_name: video-tool-windows-x64.zip
          - os: macos-latest
            label: macos
            binary_name: video-tool
            archive_name: video-tool-macos.zip
          - os: ubuntu-latest
            label: linux-x64
            binary_name: video-tool
            archive_name: video-tool-linux-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Ensure assets directory exists
        shell: bash
        run: mkdir -p assets

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release

      - name: Prepare archive contents
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          cat > dist/README.txt <<'EOF'
          Video Tool release package

          Windows:
          - ffmpeg and ffprobe are embedded if they exist in the repository assets folder at build time.

          macOS / Linux:
          - install ffmpeg and ffprobe separately and make sure they are available on PATH.
          - the app binary is included in this archive.
          EOF

      - name: Create ZIP archive
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            powershell -Command "Compress-Archive -Path * -DestinationPath ../${{ matrix.archive_name }}"
          else
            zip -r "../${{ matrix.archive_name }}" .
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.archive_name }}

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/windows-x64/video-tool-windows-x64.zip
            artifacts/macos/video-tool-macos.zip
            artifacts/linux-x64/video-tool-linux-x64.zip
